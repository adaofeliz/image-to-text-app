services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: image-to-text-app-web
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
    volumes:
      - ./logs:/app/logs
      - shared_files:/app/shared_files
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: image-to-text-app-worker
    env_file:
      - .env
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
      - DISABLE_MODEL_SOURCE_CHECK=True
    volumes:
      - ./logs:/app/logs
      - shared_files:/app/shared_files
    shm_size: 2g
    command: dramatiq app.queues.job_queue --processes 1 --threads 1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  shared_files:
