name: Update Version

on:
  push:
    branches:
      - main

jobs:
  update-version:
    name: Bump version to commit SHA
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version to commit SHA
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          sed -i "s/__version__ = \".*\"/__version__ = \"${SHORT_SHA}\"/" app/version.py

      - name: Commit updated version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/version.py
          git diff --cached --quiet || git commit -m "chore(version): bump version to ${GITHUB_SHA::7}"
          git push
